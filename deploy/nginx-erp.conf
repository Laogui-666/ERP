# ERP 系统 Nginx 反向代理配置
# 使用方式：复制到 /etc/nginx/sites-available/erp 并软链接到 sites-enabled

upstream erp_backend {
    server 127.0.0.1:3002;
    keepalive 32;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name erp.example.com;
    return 301 https://$server$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name erp.example.com;

    # SSL 证书（Let's Encrypt 或阿里云 SSL）
    ssl_certificate     /etc/nginx/ssl/erp.crt;
    ssl_certificate_key /etc/nginx/ssl/erp.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 请求体大小限制（文件上传）
    client_max_body_size 50m;

    # 日志
    access_log /var/log/nginx/erp_access.log;
    error_log  /var/log/nginx/erp_error.log;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 静态资源缓存
    location /_next/static/ {
        proxy_pass http://erp_backend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Socket.io（WebSocket 升级支持）
    location /socket.io/ {
        proxy_pass http://erp_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # API 和页面
    location / {
        proxy_pass http://erp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # 健康检查端点（内部监控）
    location = /api/health {
        proxy_pass http://erp_backend;
        access_log off;
    }
}
